name: Nightly Integration

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  full-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Full integration matrix
        run: npm run test:integration:full

      - name: Build
        run: npm run build

      - name: Upload integration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-evidence
          path: |
            examples/__tests__/__snapshots__/
          retention-days: 7
