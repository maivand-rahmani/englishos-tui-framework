name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm


      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Full integration matrix
        run: npm run test:integration:full

      - name: Build
        run: npm run build

      - name: Upload integration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-integration-evidence
          path: |
            examples/__tests__/__snapshots__/
          retention-days: 7

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npm run publish:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
